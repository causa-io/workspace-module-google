# yaml-language-server: $schema=.causa/configuration-schema.yaml

workspace:
  name: causa

project:
  name: workspace-module-google
  description: The Causa workspace module providing many functionalities related to GCP and its services.
  language: typescript
  type: package

causa:
  modules:
    "@causa/workspace-core": ">= 0.30.0"
    "@causa/workspace-typescript": ">= 0.20.0"

model:
  schema: jsonschema

  codeGenerators:
    - generator: typescriptModelClass
      globs: [./src/configurations/schemas/*.yaml]
      nestedSchemas: []
      output: src/configurations/generated.ts

javascript:
  dependencies:
    check:
      allowlist: [GHSA-vpq2-c234-7xj6, GHSA-w5hq-g745-h8pq]
    update:
      packageTargets:
        "@types/node": minor
        # `google-gax` should only be manually updated to always match the Spanner client's version.
        google-gax: semver
