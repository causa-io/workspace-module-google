# yaml-language-server: $schema=https://json-schema.org/draft-07/schema

title: GoogleServiceContainerConfiguration
type: object
description: Google-specific extensions to the service container configuration.
properties:
  serviceContainer:
    type: object
    properties:
      platform:
        anyOf:
          - type: string

          - title: GoogleCloudRunPlatform
            type: string
            enum:
              - google.cloudRun
            description: Google Cloud Run platform.

      triggers:
        type: object
        description: A map of triggers that call the service's endpoints when they occur.
        additionalProperties:
          anyOf:
            - type: object
              properties:
                type:
                  type: string
                  description: The type of trigger.
              required:
                - type

            - title: ServiceContainerGooglePubSubTrigger
              type: object
              description: A trigger backed by a Google Pub/Sub subscription.
              properties:
                type:
                  title: ServiceContainerGooglePubSubTriggerType
                  type: string
                  enum:
                    - google.pubSub
                    - event
                  description: The type of trigger.

                topic:
                  type: string
                  description: The ID of the topic triggering the endpoint.

                google.pubSub:
                  title: ServiceContainerGooglePubSubTriggerOptions
                  type: object
                  description: Google Pub/Sub-specific options for the trigger.
                  properties:
                    minimumBackoff:
                      type: string
                      description: The minimum backoff for the Pub/Sub push subscription retry policy.

                    maximumBackoff:
                      type: string
                      description: The maximum backoff for the Pub/Sub push subscription retry policy.

                    filter:
                      type: string
                      description: A Pub/Sub filter expression for the subscription.

              required:
                - type
                - topic

            - title: ServiceContainerGoogleSchedulerTrigger
              type: object
              description: A trigger backed by a Google Cloud Scheduler job.
              properties:
                type:
                  title: ServiceContainerGoogleSchedulerTriggerType
                  type: string
                  enum:
                    - google.scheduler
                    - cron
                  description: The type of trigger.

                schedule:
                  type: string
                  description: The cron schedule expression for cron triggers.

                timezone:
                  type: string
                  description: The timezone for the cron schedule.

                google.scheduler:
                  title: ServiceContainerGoogleSchedulerTriggerOptions
                  type: object
                  description: Google Cloud Scheduler-specific options for the trigger.
                  properties:
                    retryCount:
                      type: number
                      description: The number of retry attempts for the Cloud Scheduler job.

                    maxRetryDuration:
                      type: string
                      description: The maximum duration for retrying a failed job.

                    minBackoffDuration:
                      type: string
                      description: The minimum backoff duration for job retries.

                    maxBackoffDuration:
                      type: string
                      description: The maximum backoff duration for job retries.

                    maxDoublings:
                      type: number
                      description: The maximum number of times the backoff duration is doubled.

                    attemptDeadline:
                      type: string
                      description: The deadline for job attempts.

              required:
                - type
                - schedule

            - title: ServiceContainerGoogleTaskTrigger
              type: object
              description: A trigger backed by a Google Cloud Tasks queue.
              properties:
                type:
                  title: ServiceContainerGoogleTaskTriggerType
                  type: string
                  enum:
                    - google.tasks
                    - task
                  description: The type of trigger.

                queue:
                  type: string
                  description: The name of the queue for task triggers.

                retryPolicy:
                  title: ServiceContainerGoogleTaskTriggerRetryPolicy
                  type: object
                  description: The retry policy for the Cloud Tasks queue.
                  properties:
                    maxAttempts:
                      type: number
                      description: The maximum number of attempts for a task.

                    maxRetryDuration:
                      type: string
                      description: The maximum duration for retrying a failed task.

                    minBackoff:
                      type: string
                      description: The minimum backoff duration for task retries.

                    maxBackoff:
                      type: string
                      description: The maximum backoff duration for task retries.

                    maxDoublings:
                      type: number
                      description: The maximum number of times the backoff duration is doubled.

              required:
                - type
                - queue

            - title: ServiceContainerGoogleEventarcTrigger
              type: object
              description: A trigger backed by a Google Eventarc trigger.
              properties:
                type:
                  title: ServiceContainerGoogleEventarcTriggerType
                  type: string
                  enum:
                    - google.eventarc
                  description: The type of trigger.

                google.eventarc:
                  title: ServiceContainerGoogleEventarcTriggerOptions
                  type: object
                  description: Google Eventarc-specific options for the trigger.
                  properties:
                    contentType:
                      type: string
                      description: The content type of event data.

                    location:
                      oneOf:
                        - $ref: '#/$defs/_TemplateString'
                      description: The location of the Eventarc trigger.

                    filters:
                      type: array
                      items:
                        title: ServiceContainerGoogleEventarcTriggerFilter
                        type: object
                        properties:
                          attribute:
                            type: string
                            description: The event attribute to filter on.

                          value:
                            oneOf:
                              - $ref: '#/$defs/_TemplateString'
                            description: The value to match for the attribute.

                          operator:
                            type: string
                            description: The operator for matching the filter.

                        required:
                          - attribute
                          - value
                      description: The list of matching criteria for the Eventarc trigger.

                  required:
                    - contentType
                    - filters

              required:
                - type

      outputs:
        type: object
        properties:
          google.firestore:
            type: array
            items:
              type: string
            description: The list of Firestore collections this service produces data into.

          google.spanner:
            type: array
            items:
              type: string
            description: |-
              The list of Spanner databases this service produces data into.
              Each entry should be in the format `instance.database`.

$defs:
  _TemplateString:
    type: string
